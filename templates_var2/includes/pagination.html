{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Навигация по страницам">
    {% if page_obj.has_previous %}
    <a href="?{{ pagination_query }}page={{ page_obj.previous_page_number }}" class="pagination-link">← Назад</a>
    {% endif %}
    <span class="pagination-info">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?{{ pagination_query }}page={{ page_obj.next_page_number }}" class="pagination-link">Вперёд →</a>
    {% endif %}
</nav>
{% endif %}
